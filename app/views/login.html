<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Connexion</h1>
                <div class="message" id="status-message"></div>
                <form id="loginForm" method="POST" action="/api/auth/login">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit">Se connecter</button>
                </form>

            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pedagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
        function showFlashFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('flashType');
            const message = params.get('flashMessage');

            if (!type || !message) {
                return;
            }

            const el = document.getElementById('status-message');
            el.textContent = message;
            el.className = 'message ' + (type === 'success' ? 'success' : 'error');
            el.style.display = 'block';

            window.history.replaceState({}, document.title, window.location.pathname);
        }

        showFlashFromQuery();
    </script>
</body>
</html>
